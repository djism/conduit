version: "3.8"

services:

  # ── ZooKeeper ──────────────────────────────────────────────────────────────
  # Kafka's coordination service — manages broker metadata,
  # leader election, and consumer group state.
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: conduit-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - conduit

  # ── Kafka ──────────────────────────────────────────────────────────────────
  # Single-broker setup for local development.
  # In production you'd run 3+ brokers for fault tolerance.
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: conduit-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      # 9092: accessible from the host machine (our Go server)
      # 29092: internal Docker network port
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # Retain messages for 2 hours in dev — keeps disk usage low.
      # Production typically uses 7 days.
      KAFKA_LOG_RETENTION_HOURS: 2
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - conduit

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  # Stores schema registry, DLQ events, and topic metadata.
  postgres:
    image: postgres:16-alpine
    container_name: conduit-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: conduit
      POSTGRES_PASSWORD: conduit_secret
      POSTGRES_DB: conduit
    volumes:
      # Persist data across container restarts.
      # Without this, all data is lost every time the container stops.
      - conduit-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U conduit -d conduit"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - conduit

  # ── Redis ──────────────────────────────────────────────────────────────────
  # Consumer lag time-series — sorted sets with TTL-based eviction.
  redis:
    image: redis:7-alpine
    container_name: conduit-redis
    ports:
      - "6380:6379"
    command: redis-server --appendonly yes
    volumes:
      - conduit-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - conduit

  # ── Prometheus ─────────────────────────────────────────────────────────────
  # Scrapes /metrics from the Conduit server every 15 seconds.
  # Dashboard uses this for the benchmark panel.
  prometheus:
    image: prom/prometheus:latest
    container_name: conduit-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - conduit

# ── Volumes ────────────────────────────────────────────────────────────────
# Named volumes persist data across docker-compose down/up cycles.
# docker-compose down -v removes them (useful for a clean reset).
volumes:
  conduit-postgres-data:
  conduit-redis-data:

# ── Networks ───────────────────────────────────────────────────────────────
# All services share one network so they can reach each other by
# container name — e.g. postgres:5432, redis:6379, kafka:29092.
networks:
  conduit:
    driver: bridge